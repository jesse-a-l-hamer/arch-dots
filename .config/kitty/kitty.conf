# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts {{{

font_family      family='VictorMono Nerd Font' features='+ss06 +ss07'
bold_font        auto
italic_font      auto
bold_italic_font auto

disable_ligatures cursor

#: }}}

#: Text cursor customization {{{

cursor_blink_interval 0.5 ease-in-out
cursor_trail 50
cursor_trail_decay 0.1 0.3

#: }}}

#: Scrollback {{{
scrollback_lines 5000
scrollback_pager_history_size 2000
#: }}}

#: Mouse {{{

mouse_hide_wait -1.0

#: Mouse actions {{{

#: }}}

#: }}}

#: Performance tuning {{{
# repaint_delay 0
# input_delay 0
#: }}}

#: Terminal bell {{{

enable_audio_bell no
visual_bell_duration 0.5
bell_on_tab " "

#: }}}

#: Window layout {{{

enabled_layouts Tall,Fat,Grid,Splits,Stack
hide_window_decorations yes
# draw_minimal_borders no
window_padding_width 3

#: }}}

#: Tab bar {{{

tab_bar_edge top

inactive_tab_font_style italic

#: }}}

#: Color scheme {{{

# Catppuccin-Macchiato
include no-preference-theme.auto.conf

background_opacity 1.0

#: The color table {{{

#: }}}

#: }}}

#: Advanced {{{

allow_remote_control socket-only
listen_on unix:/tmp/kitty
notify_on_cmd_finish invisible 10.0 command notify-send "job finished with status: %s" %c

#: }}}

#: OS specific tweaks {{{

wayland_enable_ime no

#: }}}

