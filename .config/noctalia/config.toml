[audio]
enable_sounds = true
notification_sound = "/usr/share/noctalia/assets/sounds/notification.wav"
volume_change_sound = "/usr/share/noctalia/assets/sounds/volume-change.wav"

[bar.default]
background_opacity = 0.89999997988343239
center = [ "date", "clock", "weather", "notifications" ]
contact_shadow = true
end = [
    "toggle_osk",
    "clipboard",
    "network",
    "bluetooth",
    "input_volume",
    "volume",
    "brightness",
    "battery",
    "power_profile",
    "caffeine",
    "control-center",
    "session"
]
start = [ "toggle_app_drawer", "launcher", "wallpaper", "workspaces", "active_window", "media", "audio_visualizer", "tray" ]
widget_spacing = 8

[dock]
enabled = true
icon_size = 40
position = "left"
show_dots = true

[idle]
pre_action_fade_seconds = 10

[keybinds]
down = [ "Down", "Ctrl+n" ]
up = [ "Up", "Ctrl+p" ]
validate = [ "Return", "KP_Enter", "space", "Ctrl+y" ]

[location]
address = "Iowa City, USA"

[lockscreen_widgets]
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1920.0
    cy = 2041.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugins]
enabled = [ "noctalia/timer", "kenn/keybind-cheatsheet", "nightwatch75/todo" ]

[shell]
app_icon_color = "on_surface_variant"
font_family = "VictorMono Nerd Font"
polkit_agent = true
telemetry_enabled = true

    [shell.panel]
    transparency_mode = "soft"

    [shell.screen_corners]
    enabled = true

[theme]
builtin = "Catppuccin"
community_palette = "Catppuccin Macchiato Mauve"
source = "community"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme" ]
    community_ids = [ "zen-browser" ]

[wallpaper]
directory = "/home/jalhamer/.config/wallpapers/fractalpuccin/macchiato"
directory_dark = "/home/jalhamer/.config/wallpapers/fractalpuccin/macchiato"
directory_light = "/home/jalhamer/.config/wallpapers/fractalpuccin/latte"
transition_on_startup = true

    [wallpaper.automation]
    enabled = true
    interval_seconds = 1200

    [wallpaper.default]
    path = "/home/jalhamer/.config/wallpapers/fractalpuccin/macchiato/circle_7.png"

    [wallpaper.last]
    path = "/home/jalhamer/.config/wallpapers/fractalpuccin/macchiato/circle_7.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/jalhamer/.config/wallpapers/fractalpuccin/macchiato/circle_7.png"

[widget.toggle_app_drawer]
command = "$XDG_CONFIG_HOME/waybar/scripts/toggle_nwg-drawer.sh"
glyph = "apps"
tooltip = "Toggle app drawer"
type = "custom_button"

[widget.toggle_osk]
command = "$XDG_CONFIG_HOME/waybar/scripts/toggle_wvkbd.sh"
glyph = "keyboard"
tooltip = "Toggle the on-screen keyboard"
type = "custom_button"
